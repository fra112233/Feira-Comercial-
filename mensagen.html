<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp Clone Pro - Final</title>
    
        <script src="https://kit.fontawesome.com/158442f4ac.js" crossorigin="anonymous"></script>

    <style>
        :root {
            --wa-green: #00a884;
            --wa-bg: #efeae2;
            --wa-header: #f0f2f5;
            --wa-message-out: #d9fdd3;
            --wa-message-in: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Helvetica, sans-serif; }
        body { background-color: #dadbd3; height: 100vh; display: flex; justify-content: center; overflow: hidden; }

        .app-container { width: 100%; height: 100%; display: flex; background: #fff; position: relative; }

        /* SIDEBAR (Lista de Conversas) */
        .sidebar { 
            width: 30%; min-width: 300px; height: 100%; border-right: 1px solid #d1d7db; 
            display: flex; flex-direction: column; background: #fff; z-index: 20; transition: 0.3s; 
        }
        
        /* MAIN CHAT (Janela de Conversa) */
        .main-chat { flex: 1; display: flex; flex-direction: column; background-color: var(--wa-bg); position: relative; z-index: 10; }

        .header-ui { height: 60px; background: var(--wa-header); padding: 0 16px; display: flex; align-items: center; justify-content: space-between; color: #54656f; flex-shrink: 0; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: #ccc; overflow: hidden; flex-shrink: 0; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }

        .chat-window {
            flex: 1; padding: 15px 5%; overflow-y: auto; display: flex; flex-direction: column; gap: 8px;
            background-image: url('https://user-images.githubusercontent.com');
            background-blend-mode: overlay;
        }

        /* BOLHAS DE MENSAGEM */
        .bubble { 
            padding: 8px 12px; border-radius: 8px; font-size: 14.5px; max-width: 75%; 
            position: relative; box-shadow: 0 1px 0.5px rgba(0,0,0,0.13); word-wrap: break-word; 
        }
        .bubble.sent { align-self: flex-end; background: var(--wa-message-out); border-top-right-radius: 0; }
        .bubble.received { align-self: flex-start; background: var(--wa-message-in); border-top-left-radius: 0; }
        .time-meta { font-size: 10px; color: #667781; float: right; margin: 10px -5px -2px 10px; }

        /* MULTIMÉDIA */
        .chat-media { max-width: 100%; border-radius: 6px; display: block; margin-top: 5px; max-height: 350px; }
        .doc-box { display: flex; align-items: center; gap: 12px; background: rgba(0,0,0,0.05); padding: 10px; border-radius: 5px; text-decoration: none; color: #3b4a54; }

        /* FOOTER */
        .footer-ui { padding: 8px 12px; background: var(--wa-header); display: flex; align-items: center; gap: 10px; }
        .input-box { flex: 1; padding: 10px 15px; border-radius: 20px; border: none; outline: none; font-size: 15px; }
        .icon-btn { cursor: pointer; color: #54656f; font-size: 20px; border: none; background: none; }

        /* MOBILE ADAPTATION */
        @media (max-width: 768px) {
            .sidebar { width: 100%; position: absolute; left: 0; }
            .sidebar.mobile-hidden { left: -100%; }
            .back-btn { display: block !important; cursor: pointer; margin-right: 15px; }
        }
        .back-btn { display: none; font-size: 18px; }

        /* SWITCHER DE UTILIZADOR (EU/AMIGO) */
        #user-toggle { font-size: 10px; padding: 4px 10px; border-radius: 12px; border: 1px solid #ccc; cursor: pointer; background: #fff; }
        .active-friend { background: #007bfc !important; color: white; border-color: #007bfc !important; }

        /* MENU DE APAGAR */
        #msg-menu { position: fixed; background: white; box-shadow: 0 2px 15px rgba(0,0,0,0.2); border-radius: 8px; display: none; z-index: 1000; padding: 5px 0; }
        #msg-menu div { padding: 12px 20px; cursor: pointer; color: #ea0038; font-size: 14px; font-weight: 500; }
    </style>
</head>
<body>

<div id="msg-menu"><div id="btn-del"><i class="fa-solid fa-trash-can"></i> Apagar mensagem</div></div>

<div class="app-container">
    <!-- BARRA LATERAL -->
    <aside class="sidebar" id="sidebar">
        <header class="header-ui">
            <div class="avatar"><img src="https://i.pravatar.cc"></div>
            
            
          <a href="amigos.html"><i class="fas fa-user-friends icon-btn" style="color: #ff3344;"></i></a>
         <a href="home.html"><i class="fa-solid fa-home icon-btn" style="color: #ff3344;"></i></a>

        </header>
        <div style="flex: 1; overflow-y: auto;">
            <div class="chat-item" style="display: flex; padding: 15px; cursor: pointer; border-bottom: 1px solid #f0f2f5;" onclick="openChat()">
                <div class="avatar"><img src="https://i.pravatar.cc"></div>
                <div style="margin-left: 15px;">
                    <strong>Contacto de Teste</strong>
                    <p style="font-size: 12px; color: #00a884;">online</p>
                </div>
            </div>
        </div>
    </aside>

    <!-- JANELA DE CHAT -->
    <main class="main-chat">
        <header class="header-ui">
            <div style="display: flex; align-items: center;">
                <i class="fa-solid fa-arrow-left back-btn" onclick="closeChat()"></i>
                <div class="avatar"><img src="https://i.pravatar.cc"></div>
                <div style="margin-left: 12px;">
                    <strong>Contacto de Teste</strong><br>
                    <small style="color: #00a884;">online</small>
                </div>
            </div>
            <i class="fa-solid fa-broom icon-btn" onclick="limparTudo()" title="Limpar conversa"></i>
        </header>

        <div class="chat-window" id="chatBox">
            <div class="bubble received">Olá! Envia-me uma foto, vídeo ou documento.<span class="time-meta">10:00</span></div>
        </div>

        <footer class="footer-ui">
            <i class="fa-solid fa-plus icon-btn" onclick="document.getElementById('input-file').click()" title="Anexar"></i>
            <button id="user-toggle" title="Alternar entre Eu/Amigo">Eu</button>
            <input type="text" id="campo-texto" class="input-box" placeholder="Mensagem">
            <button class="icon-btn" id="btn-enviar"><i class="fa-solid fa-paper-plane" style="color: var(--wa-green);"></i></button>
        </footer>
        
        <!-- INPUT DE FICHEIROS OCULTO -->
        <input type="file" id="input-file" style="display:none" onchange="handleFile(event)" accept="image/*,video/*,application/*,text/*">
    </main>
</div>

<script>
    const chatBox = document.getElementById('chatBox');
    const input = document.getElementById('campo-texto');
    const sidebar = document.getElementById('sidebar');
    const userToggle = document.getElementById('user-toggle');
    const msgMenu = document.getElementById('msg-menu');
    
    let senderType = 'sent'; // 'sent' = Eu, 'received' = Amigo
    let targetMsg = null;

    // Navegação Mobile
    function openChat() { if(window.innerWidth <= 768) sidebar.classList.add('mobile-hidden'); }
    function closeChat() { sidebar.classList.remove('mobile-hidden'); }

    // Alternar utilizador (Simulação)
    userToggle.onclick = () => {
        senderType = (senderType === 'sent') ? 'received' : 'sent';
        userToggle.innerText = (senderType === 'sent') ? "Eu" : "Amigo";
        userToggle.classList.toggle('active-friend');
    };

    // Criar Bolha de Mensagem
    function createBubble(content, type) {
        const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const bubble = document.createElement('div');
        bubble.className = `bubble ${type}`;
        bubble.innerHTML = `${content} <span class="time-meta">${time}</span>`;
        
        // Menu para apagar ao clicar
        bubble.onclick = (e) => {
            e.stopPropagation();
            targetMsg = bubble;
            msgMenu.style.display = 'block';
            msgMenu.style.top = `${e.clientY}px`;
            msgMenu.style.left = `${e.clientX}px`;
        };

        chatBox.appendChild(bubble);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    // Lidar com Envio de Texto
    function enviar() {
        if(!input.value.trim()) return;
        createBubble(input.value, senderType);
        input.value = "";
    }

    // Lidar com Carregamento de Ficheiros (FOTOS, VÍDEOS, DOCUMENTOS)
    function handleFile(e) {
        const file = e.target.files[0];
        if(!file) return;

        const reader = new FileReader();
        reader.onload = (ev) => {
            let html = "";
            
            if(file.type.startsWith('image/')) {
                html = `<img src="${ev.target.result}" class="chat-media">`;
            } 
            else if(file.type.startsWith('video/')) {
                html = `<video controls class="chat-media"><source src="${ev.target.result}" type="${file.type}"></video>`;
            } 
            else {
                // Estilo para Documentos
                html = `<div class="doc-box">
                            <i class="fa-solid fa-file-lines" style="font-size: 24px; color: #7f66ff;"></i>
                            <div style="overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 180px;">
                                <strong>${file.name}</strong><br>
                                <small>${(file.size / 1024).toFixed(1)} KB</small>
                            </div>
                        </div>`;
            }
            createBubble(html, senderType);
        };
        reader.readAsDataURL(file);
        e.target.value = ""; // Limpa para permitir novo upload
    }

    // Funções de Limpeza e Menu
    document.getElementById('btn-del').onclick = () => { if(targetMsg) targetMsg.remove(); msgMenu.style.display = 'none'; };
    window.onclick = () => msgMenu.style.display = 'none';
    function limparTudo() { if(confirm("Deseja apagar todas as mensagens da conversa?")) chatBox.innerHTML = ""; }

    // Eventos de Teclado e Clique
    document.getElementById('btn-enviar').onclick = enviar;
    input.onkeypress = (e) => { if(e.key === 'Enter') enviar(); };
</script>
</body>
</html>
