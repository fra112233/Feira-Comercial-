<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Perfil Profissional</title>
    <script src="https://kit.fontawesome.com/1da7d53075.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" media="screen and (max-width: 768px)" href="styles/mobile.css" />
    <!-- SDK do Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #64748b;
            --bg: #e3f2fd;
            --white: #ffffff;
            --success: #22c55e;
            --error: #ef4444;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: #1e293b;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .form-card {
            background: var(--white);
            max-width: 700px;
            width: 100%;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        h2 { text-align: center; margin-bottom: 30px; color: var(--primary); }
        .group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; }

        input[type="text"], input[type="tel"], input[type="email"], input[type="password"], select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 15px;
        }

        .type-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 25px;
        }

        .type-option {
            border: 2px solid #e2e8f0;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .type-option input { display: none; }
        .type-option:has(input:checked) {
            border-color: var(--primary);
            background-color: #eff6ff;
        }

        .hidden { display: none; }

        .file-box {
            background: #f1f5f9;
            border: 2px dashed #cbd5e1;
            padding: 10px;
            border-radius: 8px;
            width: 100%;
        }

        .geo-btn {
            background: #334155;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .submit-btn {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }

        #location-status { font-size: 12px; margin-top: 8px; color: var(--secondary); }
        #message { margin-top: 15px; padding: 12px; border-radius: 6px; display: none; text-align: center; }
    </style>
</head>
<body>

<div class="form-card">
    <h2>Cadastro de Usuário</h2>

    <form id="mainForm">
        <!-- Seleção de Tipo -->
        <div class="type-selector">
            <label class="type-option">
                <input type="radio" name="perfilType" value="singular" checked onchange="toggleForm()">
                <span>👤 Pessoa Singular</span>
            </label>
            <label class="type-option">
                <input type="radio" name="perfilType" value="empresa" onchange="toggleForm()">
                <span>🏢 Empresa</span>
            </label>
        </div>

        <div class="group-title" style="margin: 25px 0 15px 0; color: #64748b; font-size: 16px; border-bottom: 1px solid #e2e8f0; padding-bottom: 5px; font-weight: bold;">
            <i class="fas fa-lock"></i> Credenciais de Acesso
        </div>

        <div class="group">
            <label>E-mail de Login:</label>
            <input type="email" id="email" placeholder="exemplo@dominio.com" required>
        </div>

        <div class="group">
            <label>Criar Senha / PIN (mínimo 6 caracteres):</label>
            <input type="password" id="pin" placeholder="********" required minlength="6">
        </div>

        <div class="group">
            <label>Confirmar Senha / PIN:</label>
            <input type="password" id="pin_confirm" placeholder="********" required>
        </div>

        <!-- Seção Pessoa Singular -->
        <div id="section-singular">
            <div class="group">
                <label>Nome Completo:</label>
                <input type="text" id="nome_completo" placeholder="Como consta no documento">
            </div>
        </div>

        <!-- Seção Empresa -->
        <div id="section-empresa" class="hidden">
            <div class="group">
                <label>Denominação Social:</label>
                <input type="text" id="denominacao_social" placeholder="Ex: Cisco Systems Portugal, Lda ">
            </div>
        </div>

        <div class="group">
            <label>Número de Celular / WhatsApp:</label>
            <input type="tel" id="celular" placeholder="+258 8X XXX XXXX" required>
        </div>

        <div class="group">
            <label>Localização Geográfica:</label>
            <button type="button" class="geo-btn" onclick="capturarLocalizacao()">
                📍 Obter Localização Atual
            </button>
            <div id="location-status">Não localizado</div>
            <input type="hidden" id="lat">
            <input type="hidden" id="lng">
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">Finalizar Cadastro</button>
        
        <div id="message"></div>

        <div style="text-align: center; margin-top: 20px;">
            <a href="Portal.html" style="text-decoration: none; color: var(--primary); font-weight: bold;">
                <i class="fas fa-arrow-left"></i> Voltar ao Login
            </a>
        </div>
    </form>
</div>

<script>
    // Configurações do Supabase
    const SUPABASE_URL = 'https://bljnkwrhqnpawclybqrw.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_qvUvtBjpAKtMevafHRJe8g_W-aUkOb0';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function toggleForm() {
        const type = document.querySelector('input[name="perfilType"]:checked').value;
        document.getElementById('section-singular').classList.toggle('hidden', type === 'empresa');
        document.getElementById('section-empresa').classList.toggle('hidden', type === 'singular');
    }

    function showMessage(text, isError = true) {
        const messageDiv = document.getElementById('message');
        messageDiv.textContent = text;
        messageDiv.style.display = 'block';
        messageDiv.style.backgroundColor = isError ? '#fee2e2' : '#dcfce7';
        messageDiv.style.color = isError ? '#991b1b' : '#166534';
    }

    function capturarLocalizacao() {
        const status = document.getElementById('location-status');
        if (!navigator.geolocation) {
            status.textContent = "Geolocalização não suportada.";
            return;
        }
        status.textContent = "Localizando...";
        navigator.geolocation.getCurrentPosition(
            (position) => {
                document.getElementById('lat').value = position.coords.latitude;
                document.getElementById('lng').value = position.coords.longitude;
                status.style.color = "var(--success)";
                status.textContent = "📍 Localizado com sucesso!";
            },
            () => {
                status.style.color = "var(--error)";
                status.textContent = "Erro: Permissão negada.";
            }
        );
    }

    document.getElementById('mainForm').onsubmit = async function(e) {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('pin').value;
        const confirmPassword = document.getElementById('pin_confirm').value;
        const submitBtn = document.getElementById('submitBtn');

        if (password !== confirmPassword) {
            showMessage("As senhas não coincidem!");
            return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = "A criar conta...";

        try {
            // 1. Criar Usuário no Supabase Auth
            const { data: authData, error: authError } = await supabaseClient.auth.signUp({
                email: email,
                password: password,
            });

            if (authError) throw authError;

            // 2. Se o usuário foi criado, salvar dados adicionais na tabela 'profiles'
            if (authData.user) {
                const perfilType = document.querySelector('input[name="perfilType"]:checked').value;
                const nome = perfilType === 'singular' ? 
                    document.getElementById('nome_completo').value : 
                    document.getElementById('denominacao_social').value;

                const { error: profileError } = await supabaseClient
                    .from('profiles')
                    .insert([
                        {
                            id: authData.user.id,
                            email: email,
                            full_name: nome,
                            phone: document.getElementById('celular').value,
                            type: perfilType,
                            latitude: document.getElementById('lat').value,
                            longitude: document.getElementById('lng').value
                        }
                    ]);

                if (profileError) throw profileError;

                showMessage("Cadastro realizado! Verifique o seu e-mail para confirmar a conta.", false);
                
                setTimeout(() => {
                    window.location.href = 'Portal.html';
                }, 3000);
            }

        } catch (error) {
            console.error('Erro no cadastro:', error.message);
            showMessage("Erro: " + error.message);
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = "Finalizar Cadastro";
        }
    };
</script>

</body>
</html>
