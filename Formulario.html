<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Perfil Profissional</title>
     <script
      src="https://kit.fontawesome.com/1da7d53075.js"
      crossorigin="anonymous"
    ></script>
    <link
      rel="stylesheet"
      media="screen and (max-width: 768px)"
      href="styles/mobile.css"
    />
     <!-- SDK do Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #64748b;
            --bg: #e3f2fd;
            --white: #ffffff;
            --success: #22c55e;
            --error: #ef4444;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: #1e293b;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .form-card {
            background: var(--white);
            max-width: 700px;
            width: 100%;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        h2 { text-align: center; margin-bottom: 30px; color: var(--primary); }
        .group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; }

        input[type="text"], input[type="tel"], input[type="email"], input[type="password"], select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 15px;
        }

        small.hint {
            display: block;
            margin-top: 6px;
            font-size: 12px;
            color: var(--secondary);
        }

        .type-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 25px;
        }

        .type-option {
            border: 2px solid #e2e8f0;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .type-option input { display: none; }
        .type-option:has(input:checked) {
            border-color: var(--primary);
            background-color: #eff6ff;
        }

        .hidden { display: none; }

        .file-box {
            background: #f1f5f9;
            border: 2px dashed #cbd5e1;
            padding: 10px;
            border-radius: 8px;
            width: 100%;
        }

        .geo-btn {
            background: #334155;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .submit-btn {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .submit-btn:disabled {
            background: #93c5fd;
            cursor: not-allowed;
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 3px solid rgba(255,255,255,0.4);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        .submit-btn.loading .spinner { display: inline-block; }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .item-link {
            width: 100%;
            display: block;
            text-align: center;
            background: #efc144;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 16px;
        }

        #location-status { font-size: 12px; margin-top: 8px; color: var(--secondary); }

        #submit-status {
            margin-top: 16px;
            padding: 12px 14px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            display: none;
        }

        #submit-status.show { display: block; }
        #submit-status.info    { background: #eff6ff; color: var(--primary); }
        #submit-status.success { background: #f0fdf4; color: #15803d; }
        #submit-status.error   { background: #fef2f2; color: #b91c1c; }

        .field-error {
            color: var(--error);
            font-size: 12px;
            margin-top: 6px;
            display: none;
        }
        .field-error.show { display: block; }
        input.invalid {
            border-color: var(--error) !important;
        }
    </style>
</head>
<body>

<div class="form-card">
    <h2>Perfil do Usuário </h2>

    <form id="mainForm" novalidate>
        <!-- Seleção de Tipo -->
        <div class="type-selector">
            <label class="type-option">
                <input type="radio" name="perfilType" value="singular" checked onchange="toggleForm()">
                <span>👤 Pessoa Singular</span>
            </label>
            <label class="type-option">
                <input type="radio" name="perfilType" value="empresa" onchange="toggleForm()">
                <span>🏢 Empresa</span>
            </label>
        </div>

    <!-- Bloco das Credenciais de Acesso -->
<div class="group-title" style="margin: 25px 0 15px 0; color: #64748b; font-size: 16px; border-bottom: 1px solid #e2e8f0; padding-bottom: 5px; font-weight: bold;">
    <i class="fas fa-lock"></i> Credenciais de Acesso
</div>

<div class="group">
    <label>E-mail de Login:</label>
    <input type="email" id="email" placeholder="exemplo@dominio.com" required>
    <div class="field-error" id="email-error">Introduza um e-mail válido.</div>
</div>

<div class="group">
    <label>Criar PIN de Acesso (8 caracteres: números + pelo menos 1 símbolo !, @, #, $, %, etc):</label>
    <input type="password" id="pin" maxlength="8" placeholder="Ex: 1234!567" required>
    <small class="hint">Exatamente 8 caracteres, misturando números e pelo menos 1 símbolo (! @ # $ % & *).</small>
    <div class="field-error" id="pin-error">O PIN deve ter 8 caracteres, com números e pelo menos 1 símbolo.</div>
</div>

<div class="group">
    <label>Confirmar PIN de Acesso:</label>
    <input type="password" id="pin_confirm" maxlength="8" placeholder="Repita o PIN" required>
    <div class="field-error" id="pin-confirm-error">Os PINs não coincidem.</div>
</div>

        <!-- Foto de Perfil -->
        <div class="group">
            <label>Foto de Perfil (Avatar):</label>
            <input type="file" id="foto_perfil" accept="image/*" class="file-box">
        </div>

        <!-- Campo Comum: Celular -->
        <div class="group">
            <label>Número de Celular / WhatsApp:</label>
            <input type="tel" id="celular" name="celular" placeholder="+258 8X XXX XXXX" required>
        </div>

        <!-- Seção Pessoa Singular -->
        <div id="section-singular">
            <div class="group">
                <label>Nome Completo:</label>
                <input type="text" id="nome_completo" placeholder="Como consta no documento">
            </div>
            <div class="group">
                <label>Tipo de Documento:</label>
                <select id="doc_tipo_singular" name="doc_tipo_singular">
                    <option value="BI">BI (Bilhete de Identidade)</option>
                    <option value="Passaporte">Passaporte</option>
                    <option value="DIRE">DIRE</option>
                    <option value="Certidão">Certidão de Registo Comercial / Certidão Permanente</option>
                    <option value="Contrato">Contrato Social ou Estatutos da Sociedade / NUIT</option>
                    <option value="BR">Boletim da República</option>
                </select>
            </div>
            <div class="group">
                <label>Número do Documento:</label>
                <input type="text" id="numero_documento" placeholder="Digite o número do documento">
            </div>
            <div class="group">
                <label>Gênero:</label>
                <select id="genero" name="genero">
                    <option value="">Selecione...</option>
                    <option value="M">Masculino</option>
                    <option value="F">Feminino</option>
                    <option value="E">Empresa</option>
                </select>
            </div>
        </div>

        <!-- Seção Empresa -->
        <div id="section-empresa" class="hidden">
            <div class="group">
                <label>Denominação Social:</label>
                <input type="text" id="denominacao_social" placeholder="Ex: Cisco Systems Portugal, Lda ">
            </div>
            <div class="group">
                <label>NUIT :</label>
                <input type="text" id="nuit" placeholder="Número de identificação fiscal">
            </div>
        </div>

        <!-- Setor de Serviço -->
        <div class="group">
            <label>Sector de Atuação:</label>
            <select id="sector" name="sector">
                <option value="">Selecione uma opção...</option>
                <option value="tecnologia">Tecnologia e IT</option>
                <option value="construcao">Construção e Obras</option>
                <option value="saude">Saúde e Bem-estar</option>
                <option value="educacao">Educação/Formação</option>
                <option value="outro">Outros Serviços</option>
            </select>
        </div>

        <!-- Foto do Documento -->
        <div class="group">
            <label>Upload do Documento (Frente e verso/Alvará):</label>
            <input type="file" id="foto_documento" accept="image/*" class="file-box">
        </div>

        <!-- Localização -->
        <div class="group">
            <label>Localização Geográfica:</label>
            <button type="button" class="geo-btn" onclick="capturarLocalizacao()">
                📍 Obter Localização Atual
            </button>
            <div id="location-status">Não localizado</div>
            <input type="hidden" id="lat" name="latitude">
            <input type="hidden" id="lng" name="longitude">
        </div>

        <!-- Visibilidade -->
        <div class="group">
            <label>Visibilidade do Perfil:</label>
            <select id="visibilidade" name="visibilidade">
                <option value="publico">🌍 Público(Visível para todos)</option>
                <option value="privado">🔒 Privado(Apenas eu)</option>
                <option value="apenas_clientes">👥 Apenas Clientes Cadastrados</option>
            </select>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">
            <span class="spinner"></span>
            <span id="submitBtnText">Finalizar Cadastro</span>
        </button>

        <div id="submit-status"></div>

        <br>
        <b><a href="Portal.html" class="item-link" style="text-decoration: none; color: inherit;">
            <i class="fas fa-light fa-person-walking-arrow-right"></i>
            <strong>Voltar a pagina</strong>
        </a></b>

    </form>
</div>

<script>

    // Configurações do Supabase
    const SUPABASE_URL = 'https://bljnkwrhqnpawclybqrw.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_qvUvtBjpAKtMevafHRJe8g_W-aUkOb0';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Regra do PIN: exatamente 8 caracteres, pelo menos 1 número e pelo menos 1 símbolo
    // permitido, o resto pode ser número. Símbolos aceites: ! @ # $ % & *
    const PIN_REGEX = /^(?=.*[0-9])(?=.*[!@#$%^&*])[0-9!@#$%^&*]{8}$/;

    function toggleForm() {
        const type = document.querySelector('input[name="perfilType"]:checked').value;
        document.getElementById('section-singular').classList.toggle('hidden', type === 'empresa');
        document.getElementById('section-empresa').classList.toggle('hidden', type === 'singular');
    }

    function capturarLocalizacao() {
        const status = document.getElementById('location-status');
        if (!navigator.geolocation) {
            status.textContent = "Geolocalização não suportada pelo seu navegador.";
            return;
        }
        status.textContent = "Localizando...";
        navigator.geolocation.getCurrentPosition(
            (position) => {
                document.getElementById('lat').value = position.coords.latitude;
                document.getElementById('lng').value = position.coords.longitude;
                status.style.color = "var(--success)";
                status.textContent = `📍 Localizado com sucesso! (${position.coords.latitude.toFixed(4)}, ${position.coords.longitude.toFixed(4)})`;
            },
            () => {
                status.style.color = "var(--error)";
                status.textContent = "Erro: Permissão de localização negada.";
            }
        );
    }

    function setFieldError(inputEl, errorEl, show) {
        inputEl.classList.toggle('invalid', show);
        errorEl.classList.toggle('show', show);
    }

    function setStatus(message, type) {
        const box = document.getElementById('submit-status');
        box.textContent = message;
        box.className = 'show ' + type; // 'info' | 'success' | 'error'
    }

    function setLoading(isLoading) {
        const btn = document.getElementById('submitBtn');
        const btnText = document.getElementById('submitBtnText');
        btn.classList.toggle('loading', isLoading);
        btn.disabled = isLoading;
        btnText.textContent = isLoading ? 'A processar...' : 'Finalizar Cadastro';
    }

    document.getElementById('mainForm').addEventListener('submit', async function (e) {
        e.preventDefault();

        const emailEl = document.getElementById('email');
        const pinEl = document.getElementById('pin');
        const pinConfirmEl = document.getElementById('pin_confirm');

        const email = emailEl.value.trim();
        const pin = pinEl.value;
        const pinConfirm = pinConfirmEl.value;

        // reset previous error states
        setFieldError(emailEl, document.getElementById('email-error'), false);
        setFieldError(pinEl, document.getElementById('pin-error'), false);
        setFieldError(pinConfirmEl, document.getElementById('pin-confirm-error'), false);
        document.getElementById('submit-status').className = '';

        let hasError = false;

        // Validar e-mail
        if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
            setFieldError(emailEl, document.getElementById('email-error'), true);
            hasError = true;
        }

        // Validar formato do PIN (8 caracteres, números + pelo menos 1 símbolo)
        if (!PIN_REGEX.test(pin)) {
            setFieldError(pinEl, document.getElementById('pin-error'), true);
            hasError = true;
        }

        // Validar se os PINs coincidem
        if (pin !== pinConfirm) {
            setFieldError(pinConfirmEl, document.getElementById('pin-confirm-error'), true);
            hasError = true;
        }

        if (hasError) {
            setStatus('Corrija os campos assinalados a vermelho antes de continuar.', 'error');
            return;
        }

        // Recolher restantes dados do formulário
        const perfilType = document.querySelector('input[name="perfilType"]:checked').value;
        const nome = perfilType === 'singular'
            ? document.getElementById('nome_completo').value
            : document.getElementById('denominacao_social').value;
        const celular = document.getElementById('celular').value;
        const lat = document.getElementById('lat').value;
        const lng = document.getElementById('lng').value;
        const sector = document.getElementById('sector').value;
        const visibilidade = document.getElementById('visibilidade').value;

        setLoading(true);
        setStatus('A processar o seu cadastro, aguarde...', 'info');

        try {
            // 1. Criar o utilizador na autenticação do Supabase
            const { data: authData, error: authError } = await supabaseClient.auth.signUp({
                email: email,
                password: pin
            });

            if (authError) throw authError;
            if (!authData.user) throw new Error('Não foi possível criar o utilizador. Tente novamente.');

            // 2. Guardar os dados adicionais na tabela 'profiles'
            const { error: profileError } = await supabaseClient
                .from('profiles')
                .insert([
                    {
                        id: authData.user.id,
                        email: email,
                        full_name: nome,
                        phone: celular,
                        type: perfilType,
                        sector: sector,
                        visibility: visibilidade,
                        latitude: lat || null,
                        longitude: lng || null
                    }
                ]);

            if (profileError) throw profileError;

            setStatus('✅ Cadastro realizado com sucesso! Verifique o seu e-mail para confirmar a conta. A redirecionar...', 'success');

            setTimeout(() => {
                window.location.href = 'Portal.html';
            }, 3000);

        } catch (err) {
            console.error('Erro no cadastro:', err);
            setStatus('❌ Erro ao submeter o cadastro: ' + (err.message || 'Tente novamente mais tarde.'), 'error');
            setLoading(false);
        }
    });

</script>

</body>
</html>
