<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Next-Gen Social Network - Rede Social Moderna">
    <title>Perfil | Feira Comercial </title>
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">

    <!-- SDK do Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        /* CSS Variables - Mantendo o seu estilo original */
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #e0e7ff;
            --secondary: #8b5cf6;
            --accent: #ec4899;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-tertiary: #94a3b8;
            --border-color: #334155;
            --radius-md: 10px;
            --radius-lg: 14px;
            --radius-xl: 20px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            margin: 0;
            padding: 0;
        }

        header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 12px 20px;
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .main-container {
            max-width: 1000px;
            margin: 20px auto;
            padding: 0 20px;
        }

        .profile-header {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            overflow: hidden;
            margin-bottom: 20px;
        }

        .cover-photo {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
        }

        .profile-info-container {
            padding: 20px;
            position: relative;
            margin-top: -60px;
            text-align: center;
        }

        .profile-pic-wrapper {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 16px;
        }

        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid var(--bg-secondary);
            object-fit: cover;
            background: var(--bg-tertiary);
        }

        .profile-name { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
        .profile-email { color: var(--text-tertiary); font-size: 14px; margin-bottom: 12px; }

        .btn {
            padding: 10px 20px;
            border-radius: var(--radius-md);
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-danger { background: var(--danger); color: white; margin-top: 10px; }

        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .form-group label { display: block; margin-bottom: 5px; font-size: 14px; color: var(--text-secondary); }
        
        input {
            width: 100%;
            padding: 10px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            color: white;
        }

        #loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
    </style>
</head>
<body>

<div id="loading-overlay">
    <p>A carregar perfil...</p>
</div>

<header>
    <a href="index.html" style="color: white; text-decoration: none;"><i class="fas fa-arrow-left"></i> Voltar</a>
    <div class="profile-name-header" id="header-user-name">Usuário</div>
</header>

<div class="main-container">
    <div class="profile-header">
        <div class="cover-photo"></div>
        <div class="profile-info-container">
            <div class="profile-pic-wrapper">
                <img src="https://via.placeholder.com/120" alt="Foto de Perfil" class="profile-pic" id="display-avatar">
            </div>
            <h1 class="profile-name" id="display-name">Carregando...</h1>
            <p class="profile-email" id="display-email">...</p>

            <div style="max-width: 400px; margin: 0 auto; background: var(--bg-tertiary); padding: 20px; border-radius: var(--radius-lg);">
                <h3 style="margin-bottom: 15px;">Editar Perfil</h3>
                <div class="form-group">
                    <label>Nome Completo / Empresa</label>
                    <input type="text" id="input-name">
                </div>
                <div class="form-group">
                    <label>Telefone</label>
                    <input type="tel" id="input-phone">
                </div>
                <button class="btn btn-primary" onclick="updateProfile()" id="save-btn">Guardar Alterações</button>
            </div>

            <button class="btn btn-danger" onclick="handleLogout()">Sair da Conta</button>
        </div>
    </div>
</div>

<script>
    // Configurações do Supabase
    const SUPABASE_URL = 'https://bljnkwrhqnpawclybqrw.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_qvUvtBjpAKtMevafHRJe8g_W-aUkOb0';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentUser = null;

    // 1. Carregar Dados do Perfil
    async function loadProfile() {
        try {
            const { data: { user } } = await supabaseClient.auth.getUser();
            
            if (!user) {
                window.location.href = 'Portal.html';
                return;
            }

            currentUser = user;

            // Buscar dados na tabela 'profiles'
            const { data: profile, error } = await supabaseClient
                .from('profiles')
                .select('*')
                .eq('id', user.id)
                .single();

            if (error && error.code !== 'PGRST116') throw error;

            // Atualizar UI
            document.getElementById('display-name').textContent = profile?.full_name || 'Utilizador';
            document.getElementById('display-email').textContent = user.email;
            document.getElementById('header-user-name').textContent = profile?.full_name || 'Utilizador';
            
            document.getElementById('input-name').value = profile?.full_name || '';
            document.getElementById('input-phone').value = profile?.phone || '';

            // Se tiver avatar na tabela, carregar (aqui você pode integrar com o Storage do Supabase futuramente)
            if (profile?.avatar_url) {
                document.getElementById('display-avatar').src = profile.avatar_url;
            }

        } catch (error) {
            console.error('Erro ao carregar perfil:', error.message);
        } finally {
            document.getElementById('loading-overlay').style.display = 'none';
        }
    }

    // 2. Atualizar Perfil
    async function updateProfile() {
        const saveBtn = document.getElementById('save-btn');
        const newName = document.getElementById('input-name').value;
        const newPhone = document.getElementById('input-phone').value;

        saveBtn.disabled = true;
        saveBtn.textContent = "A guardar...";

        try {
            const { error } = await supabaseClient
                .from('profiles')
                .upsert({
                    id: currentUser.id,
                    full_name: newName,
                    phone: newPhone,
                    updated_at: new Date()
                });

            if (error) throw error;

            alert("Perfil atualizado com sucesso!");
            location.reload(); // Recarrega para sincronizar tudo

        } catch (error) {
            alert("Erro ao atualizar: " + error.message);
        } finally {
            saveBtn.disabled = false;
            saveBtn.textContent = "Guardar Alterações";
        }
    }

    // 3. Logout
    async function handleLogout() {
        await supabaseClient.auth.signOut();
        window.location.href = 'Portal.html';
    }

    // Iniciar
    loadProfile();
</script>

</body>
</html>
